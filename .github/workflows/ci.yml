name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOWORK: "off"
  GOFLAGS: "-mod=readonly"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install pinned TinyGo
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/tinygo0.41.1.linux-amd64.tar.gz"
          curl --proto '=https' --tlsv1.2 --location --fail --silent --show-error \
            --output "$archive" \
            https://github.com/tinygo-org/tinygo/releases/download/v0.41.1/tinygo0.41.1.linux-amd64.tar.gz
          echo 'e156d1d93a376eef639a4143d13be07e8c463fb6cf2d7d447698ed4474d23e91  '"$archive" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/tinygo/bin" >> "$GITHUB_PATH"

      - name: Install pinned GoSX
        shell: bash
        run: |
          set -euo pipefail
          go install m31labs.dev/gosx/cmd/gosx@v0.31.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain pins
        shell: bash
        run: |
          set -euo pipefail
          go version
          [[ "$(gosx version)" == 'gosx v0.31.4' ]]
          tinygo version | grep -Fq 'tinygo version 0.41.1'

      - name: Verify module graph and Go code
        shell: bash
        run: |
          set -euo pipefail
          go mod verify
          go test ./... -count=1
          go vet ./...

      - name: Run production release gate
        shell: bash
        env:
          PLAYGROUND_CHROME: ${{ steps.chrome.outputs.chrome-path }}
        run: ./scripts/verify-production.sh

      - name: Confirm tracked sources remain clean
        shell: bash
        run: git diff --exit-code
